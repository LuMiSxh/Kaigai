name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
    inputs:
      release_tag:
        description: Release tag to verify against package versions
        required: false
        type: string
        default: ""

env:
  KAIGAI_SKIP_RESOURCE_DOWNLOADS: "1"

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.11.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type-check (svelte-check)
        run: pnpm run check
      - name: Unit tests
        run: pnpm test

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  bindings-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Regenerate TypeScript bindings
        run: cargo test --manifest-path src-tauri/Cargo.toml export_bindings
      - name: Fail if bindings drifted
        run: git diff --exit-code src/types/bindings.ts

  release-version:
    if: inputs.release_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Verify release versions
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          tag_version="${RELEASE_TAG#v}"
          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          cargo_version="$(sed -n '/^\[package\]/,/^\[/{s/^version = \"\(.*\)\"/\1/p;}' src-tauri/Cargo.toml | head -1)"
          if [ "$package_version" != "$tag_version" ] || \
             [ "$tauri_version" != "$tag_version" ] || \
             [ "$cargo_version" != "$tag_version" ]; then
            echo "::error::Tag $tag_version does not match package.json=$package_version, tauri.conf.json=$tauri_version, Cargo.toml=$cargo_version"
            exit 1
          fi
